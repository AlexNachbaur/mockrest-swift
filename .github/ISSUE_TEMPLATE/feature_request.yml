name: Feature request
description: Suggest new functionality or an API improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do in your tests that MockREST doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        How you imagine it working — a sketch of the Swift API you'd like to write is ideal.
      render: swift
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other API shapes that could solve the same problem.
    validations:
      required: false
